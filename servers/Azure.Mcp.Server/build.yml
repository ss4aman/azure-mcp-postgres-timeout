parameters:
- name: PublishTarget
  type: string
  values: [ none, internal, public ]
  default: 'none'
- name: IncludeNative
  type: boolean
  default: true
- name: TestTimeoutInMinutes
  displayName: Test Timeout In Minutes
  type: number
  default: 45
- name: BuildTimeoutInMinutes
  displayName: Build Timeout In Minutes
  type: number
  default: 90
- name: RunVSCodeIntegrationTests
  displayName: Run VS Code Integration Tests (Outerloop Playwright)
  type: boolean
  default: false

trigger: none
pr: none

extends:
  template: /eng/pipelines/templates/common.yml
  parameters:
    ServerName: Azure.Mcp.Server
    PublishTarget: ${{ parameters.PublishTarget }}
    RunLiveTests: true
    RunVSCodeIntegrationTests: ${{ parameters.RunVSCodeIntegrationTests }}
    PackageDocker: true
    PackageVSIX: true
    PackagePyPI: true
    PackageMCPB: true
    IncludeNative: ${{ parameters.IncludeNative }}
    TestTimeoutInMinutes: ${{ parameters.TestTimeoutInMinutes }}
    BuildTimeoutInMinutes: ${{ parameters.BuildTimeoutInMinutes }}
