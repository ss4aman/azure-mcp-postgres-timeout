parameters:
  - name: PathToArtifacts
    type: string
  - name: Registry
    type: string
  - name: Tag
    type: string
  - name: ServiceConnection
    type: string
    default: ''
  - name: Access
    type: string
    default: 'public'
  - name: IgnoreDuplicates
    type: boolean
    default: true

steps:
  - template: /eng/common/pipelines/templates/steps/set-default-branch.yml

  - template: /eng/common/pipelines/templates/steps/create-authenticated-npmrc.yml
    parameters:
      npmrcPath: ${{parameters.PathToArtifacts}}/.npmrc
      registryUrl: ${{parameters.Registry}}
      ServiceConnection: ${{parameters.ServiceConnection}}

  - pwsh: |
      $ignoreDuplicates = $${{parameters.IgnoreDuplicates}}
      $tgzFiles = Get-ChildItem -Path . -Filter *.tgz -Recurse
      | Sort-Object FullName

      if ($tgzFiles.Count -eq 0) {
        Write-Host "No .tgz files found in ${{parameters.PathToArtifacts}}"
        exit 1
      }

      Write-Host "Publishing the following files to ${{parameters.Registry}}:"
      foreach ($file in $tgzFiles) {
        Write-Host "  - $($file.FullName)"
      }

      $access = '${{parameters.Access}}'
      $tag = '${{parameters.Tag}}'

      foreach ($file in $tgzFiles) {
        $command = "npm publish '$file' --loglevel verbose"

        if (![string]::IsNullOrEmpty($access)) {
          $command += " --access $access"
        }

        if (![string]::IsNullOrEmpty($tag)) {
          $command += " --tag '$tag'"
        }

        Write-Host "> $command"
        Invoke-Expression $command 2>&1 | Tee-Object -Variable publishOutput
        if ($LASTEXITCODE -ne 0) {
          if ($ignoreDuplicates -and $publishOutput -match 'The feed .* already contains file') {
            Write-Host "Package $($file.FullName) has already been published with the same version. Skipping."
          } else {
            Write-Host "Failed to publish $($file.FullName). Error: $publishOutput"
            exit 1
          }
        }
      }
    displayName: Publish packages to dev feed
    workingDirectory: ${{parameters.PathToArtifacts}}
