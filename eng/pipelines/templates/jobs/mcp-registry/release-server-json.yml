parameters:
- name: ServerName
  type: string
- name: NuGetFeedIndexUrl
  type: string
  default: 'https://api.nuget.org/v3/index.json'
- name: DependsOn
  type: object
- name: PackageMCPB
  type: boolean

jobs:
- job: BuildAndUpdateMcpRepository
  displayName: Publish server.json to MCP Repository
  ${{ if parameters.DependsOn }}:
    dependsOn: ${{ parameters.DependsOn }}
  condition: and(succeeded(), ne(variables['Skip.PublishPackage'], 'true'))
  pool:
    name: $(LINUXPOOL)
    image: $(LINUXVMIMAGE)
    os: linux

  steps:
  - checkout: self

  - download: current
    displayName: Download build_info
    artifact: build_info

  - ${{ if parameters.PackageMCPB }}:
    - download: current
      displayName: Download signed MCPB packages
      artifact: packages_mcpb_signed

    - task: Powershell@2
      displayName: 'Update server.json with MCPB SHA256 hashes'
      inputs:
        pwsh: true
        filePath: $(Build.SourcesDirectory)/eng/scripts/Update-ServerJsonMcpbHashes.ps1
        arguments: >
          -ServerName '${{ parameters.ServerName }}'
          -McpbPath '$(Pipeline.Workspace)/packages_mcpb_signed/${{ parameters.ServerName }}'
          -ServerJsonPath '$(Pipeline.Workspace)/build_info/${{ parameters.ServerName }}/server.json'
          -BuildInfoPath '$(Pipeline.Workspace)/build_info/build_info.json'

  - task: Powershell@2
    displayName: 'Verify Nuget package was published'
    inputs:
      pwsh: true
      filePath: $(Build.SourcesDirectory)/eng/scripts/Verify-NuGetRelease.ps1
      arguments: >
        -ServerName '${{ parameters.ServerName }}'
        -BuildInfoPath '$(Pipeline.Workspace)/build_info/build_info.json'
        -NuGetFeedIndexUrl '${{ parameters.NuGetFeedIndexUrl }}'

  - pwsh: |
      $serverJsonPath = '$(Pipeline.Workspace)/build_info/${{ parameters.ServerName }}/server.json'
      Write-Host "Contents of server.json before staging:"
      Get-Content -Path $serverJsonPath | Write-Host

      $stagingDirectory = '$(Build.ArtifactStagingDirectory)/server-json'
      New-Item -ItemType Directory -Path $stagingDirectory -ErrorAction SilentlyContinue | Out-Null
      Copy-Item -Path $serverJsonPath -Destination $stagingDirectory

      Write-Host "Staged server.json to $stagingDirectory"
    displayName: 'Stage server.json for release'
  
  - task: 1ES.PublishPipelineArtifact@1
    displayName: Publish Server.json artifact
    inputs:
      path: $(Build.ArtifactStagingDirectory)/server-json
      artifact: server.json_${{ parameters.ServerName }}
  
  - task: ESRPRelease@12
    displayName: Publish server.json to MCP Repository
    inputs:
      ConnectedServiceName: 'Azure SDK PME Managed Identity'
      ClientId: '5f81938c-2544-4f1f-9251-dd9de5b8a81b'
      DomainTenantId: '975f013f-7f24-47e8-a7d3-abc4752bf346'
      UseManagedIdentity: true
      KeyVaultName: 'kv-azuresdk-codesign'
      SignCertName: 'azure-sdk-esrp-release-certificate'
      Intent: 'PackageDistribution'
      ContentType: 'MCPServer'
      McpRegistryType: 'Official'
      ContentSource: 'Folder'
      FolderLocation: '$(Build.ArtifactStagingDirectory)/server-json'
      Owners: ${{ coalesce(variables['Build.RequestedForEmail'], 'azuresdk@microsoft.com') }}
      Approvers: ${{ coalesce(variables['Build.RequestedForEmail'], 'azuresdk@microsoft.com') }}
      ServiceEndpointUrl: 'https://api.esrp.microsoft.com'
      MainPublisher: 'ESRPRELPACMANTEST'
