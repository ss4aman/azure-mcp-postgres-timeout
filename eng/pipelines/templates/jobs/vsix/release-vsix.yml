parameters:
- name: ServerName
  type: string
- name: DependsOn
  type: object
- name: VsixTargets
  type: object
  default:
    - linux-x64
    - linux-arm64
    - macos-x64
    - macos-arm64
    - windows-x64
    - windows-arm64

jobs:
# Regular job: Create an authenticated .npmrc once and publish it so each
# deployment job can install @vscode/vsce from the internal feed without
# needing service-connection access from inside the production release job.
- job: AuthenticateNpmrc
  displayName: "Create authenticated .npmrc for vsce install"
  dependsOn: ${{ parameters.DependsOn }}
  condition: and(succeeded(), ne(variables['Skip.PublishPackage'], 'true'))
  pool:
    name: $(LINUXPOOL)
    image: $(LINUXVMIMAGE)
    os: linux
  steps:
  - checkout: self

  - template: /eng/common/pipelines/templates/steps/create-authenticated-npmrc.yml
    parameters:
      npmrcPath: $(Agent.TempDirectory)/vsix_npmrc/.npmrc

  - task: 1ES.PublishPipelineArtifact@1
    displayName: Publish authenticated .npmrc
    inputs:
      path: $(Agent.TempDirectory)
      artifact: vsix_npmrc

# Deployment Jobs: Publish VSIX artifacts to Marketplace for each vsix target
- ${{ each VsixTarget in parameters.VsixTargets }}:
  - deployment: PublishVSIX_${{ replace(VsixTarget, '-', '_') }}
    displayName: "Publish VSIX Artifact to Marketplace - ${{ VsixTarget }}"
    dependsOn:
    - ${{ parameters.DependsOn }}
    - AuthenticateNpmrc
    condition: and(succeeded(), ne(variables['Skip.PublishPackage'], 'true'))
    templateContext:
      type: releaseJob
      isProduction: true
      inputs:
      - input: pipelineArtifact
        artifactName: packages_vsix_signed
        targetPath: $(Pipeline.Workspace)/drop
      - input: pipelineArtifact
        artifactName: build_info
        targetPath: $(Pipeline.Workspace)/build_info
      - input: pipelineArtifact
        artifactName: vsix_npmrc
        targetPath: $(Agent.TempDirectory)/vsix_npmrc
    environment: package-publish
    pool:
      name: azsdk-pool
      image: ubuntu-24.04
      os: linux
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureCLI@2
            displayName: "Publish (using vsce) - ${{ VsixTarget }}"
            inputs:
              azureSubscription: azure-sdk-vsmarketplace
              scriptType: pscore
              scriptLocation: inlineScript
              workingDirectory: $(Pipeline.Workspace)/drop/${{ parameters.ServerName }}/${{ VsixTarget }}
              inlineScript: |
                Write-Host "Publishing VSIX for ${{ VsixTarget }}"
                Write-Host "VS Code Marketplace info for az login:"
                az rest -u https://app.vssps.visualstudio.com/_apis/profile/profiles/me --resource 499b84ac-1321-427f-aa17-267ca6975798

                $buildInfo = Get-Content "$(Pipeline.Workspace)/build_info/build_info.json" -Raw | ConvertFrom-Json
                $server = $buildInfo.servers | Where-Object { $_.name -eq '${{ parameters.ServerName }}' }

                $baseName = Get-ChildItem *.vsix | Select-Object -ExpandProperty BaseName -First 1

                $publishArgs = @('--azure-credential', '--packagePath', "$baseName.vsix", "--manifestPath", "$baseName.manifest", "--signaturePath", "$baseName.signature.p7s")
                if ($server.vsixIsPrerelease) {
                    $publishArgs += '--pre-release'
                }

                Write-Host @"
                Server: $($server.name)
                Version: $($server.version)
                VSIX Version: $($server.vsixVersion)
                VSIX baseName: $baseName
                Is Prerelease: $($server.vsixIsPrerelease)
                "@

                Write-Host "`nInstalling vsce from authenticated feed..."
                npm install -g @vscode/vsce --userconfig "$(Agent.TempDirectory)/vsix_npmrc/.npmrc"

                Write-Host "Executing: vsce publish $($publishArgs -join ' ')"
                vsce publish @publishArgs
